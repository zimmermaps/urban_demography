<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GUDD Explorer</title>
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:
        radial-gradient(circle at 16% 8%, rgba(53, 128, 193, 0.26) 0%, rgba(53, 128, 193, 0) 50%),
        radial-gradient(circle at 84% 14%, rgba(124, 97, 232, 0.24) 0%, rgba(124, 97, 232, 0) 48%),
        linear-gradient(168deg, #0a1622 0%, #0e1d2d 100%);
      --ink: #d8e9fb;
      --muted: #9fc0df;
      --card-bg: linear-gradient(180deg, rgba(12, 25, 38, 0.98), rgba(9, 19, 30, 0.98));
      --card-border: rgba(149, 184, 219, 0.32);
      --card-shadow: 0 16px 34px rgba(2, 7, 12, 0.46);
      --link-bg: #294b6c;
      --link-fg: #e5f3ff;
      --link-border: #7fb6ec;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "IBM Plex Mono", monospace;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px;
      display: grid;
      gap: 12px;
    }

    .hero,
    .cards {
      border: 1px solid var(--card-border);
      border-radius: 12px;
      background: var(--card-bg);
      box-shadow: var(--card-shadow);
    }

    .hero {
      padding: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .cards {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px;
      background: rgba(18, 36, 54, 0.55);
      display: grid;
      gap: 8px;
    }

    .card h2 {
      margin: 0;
      font-size: 0.92rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.35;
    }

    .preview-frame {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: rgba(12, 25, 38, 0.8);
      overflow: hidden;
    }

    .preview-frame svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .card a {
      justify-self: start;
      text-decoration: none;
      border: 1px solid var(--link-border);
      border-radius: 9px;
      padding: 5px 10px;
      color: var(--link-fg);
      background: var(--link-bg);
      font-size: 0.74rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Global Urban Demographic Dataset (GUDD) Explorer</h1>
      <p class="subtitle">Choose a viewer.</p>
    </section>
    <section class="cards">
      <article class="card">
        <h2>GUDD Explorer | Maps</h2>
        <p>Interactive boundary map with click-through city demographic panels and exports.</p>
        <div class="preview-frame">
          <svg viewBox="0 0 320 180" role="img" aria-label="Map viewer preview">
            <defs>
              <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0f2334"/>
                <stop offset="100%" stop-color="#1b3b56"/>
              </linearGradient>
            </defs>
            <rect width="320" height="180" fill="url(#mapBg)"/>
            <rect x="0" y="0" width="112" height="180" fill="#12283c" opacity="0.96"/>
            <rect x="10" y="11" width="54" height="14" rx="4" fill="#295174"/>
            <rect x="10" y="31" width="92" height="18" rx="5" fill="#1f405d"/>
            <rect x="10" y="55" width="92" height="30" rx="5" fill="#1a3650"/>
            <rect x="10" y="91" width="92" height="38" rx="5" fill="#193249"/>
            <rect x="10" y="134" width="44" height="30" rx="5" fill="#22445f"/>
            <rect x="58" y="134" width="44" height="30" rx="5" fill="#22445f"/>
            <rect x="122" y="9" width="127" height="24" rx="6" fill="#1d6172"/>
            <rect x="256" y="9" width="56" height="24" rx="6" fill="#214766"/>
            <path d="M122 44 L165 38 L197 52 L231 42 L271 58 L311 48 L311 174 L122 174 Z" fill="#26587a"/>
            <path d="M130 66 L163 60 L196 74 L229 65 L266 82 L303 72 L303 166 L130 166 Z" fill="#2f6a91"/>
            <path d="M137 87 L169 82 L197 93 L230 87 L260 101 L295 95 L295 159 L137 159 Z" fill="#3b7faa"/>
            <circle cx="220" cy="102" r="6" fill="#ffd98a"/>
            <circle cx="220" cy="102" r="3" fill="#ffb65a"/>
          </svg>
        </div>
        <a href="./maps/index.html">Open Maps</a>
      </article>
      <article class="card">
        <h2>GUDD Explorer | Plots</h2>
        <p>Animated population versus dependency plot viewer with GIF and PNG downloads.</p>
        <div class="preview-frame">
          <svg viewBox="0 0 320 180" role="img" aria-label="Plots viewer preview">
            <defs>
              <linearGradient id="plotBg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0f2233"/>
                <stop offset="100%" stop-color="#1a3a53"/>
              </linearGradient>
            </defs>
            <rect width="320" height="180" fill="url(#plotBg)"/>
            <rect x="9" y="10" width="302" height="30" rx="6" fill="#163147"/>
            <rect x="15" y="17" width="84" height="16" rx="4" fill="#264c6e"/>
            <rect x="103" y="17" width="72" height="16" rx="4" fill="#264c6e"/>
            <rect x="179" y="17" width="58" height="16" rx="4" fill="#264c6e"/>
            <rect x="241" y="17" width="30" height="16" rx="4" fill="#2f5b7f"/>
            <rect x="275" y="17" width="30" height="16" rx="4" fill="#2f5b7f"/>
            <rect x="9" y="46" width="302" height="124" rx="6" fill="#12283d"/>
            <rect x="21" y="57" width="286" height="102" rx="6" fill="#15324a"/>
            <line x1="38" y1="145" x2="294" y2="145" stroke="#9ec8e5" stroke-width="1.4"/>
            <line x1="38" y1="145" x2="38" y2="70" stroke="#9ec8e5" stroke-width="1.4"/>
            <line x1="85" y1="145" x2="85" y2="70" stroke="#5d86aa" stroke-opacity="0.38"/>
            <line x1="132" y1="145" x2="132" y2="70" stroke="#5d86aa" stroke-opacity="0.38"/>
            <line x1="179" y1="145" x2="179" y2="70" stroke="#5d86aa" stroke-opacity="0.38"/>
            <line x1="226" y1="145" x2="226" y2="70" stroke="#5d86aa" stroke-opacity="0.38"/>
            <line x1="273" y1="145" x2="273" y2="70" stroke="#5d86aa" stroke-opacity="0.38"/>
            <polyline points="45,137 74,131 103,124 132,116 161,109 190,100 219,95 248,87 278,79" fill="none" stroke="#f6c96c" stroke-width="2.6"/>
            <polyline points="45,142 74,138 103,132 132,125 161,119 190,112 219,106 248,99 278,92" fill="none" stroke="#7cdcff" stroke-width="2.6"/>
            <circle cx="190" cy="100" r="2.7" fill="#ffe6b3"/>
            <circle cx="248" cy="87" r="2.7" fill="#ffe6b3"/>
            <circle cx="219" cy="106" r="2.7" fill="#a6ebff"/>
            <circle cx="278" cy="92" r="2.7" fill="#a6ebff"/>
          </svg>
        </div>
        <a href="./plots/index.html">Open Plots</a>
      </article>
    </section>
  </main>
</body>
</html>
